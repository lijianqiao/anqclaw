name: Release

"on":
    push:
        tags:
            - "v*"
    workflow_dispatch:
        inputs:
            tag:
                description: Release tag, for example v0.6.1
                required: true
                type: string
            prerelease:
                description: Mark this release as a prerelease
                required: false
                type: boolean
                default: false

permissions:
    contents: write

env:
    MANIFEST_PATH: agent/Cargo.toml

jobs:
    prepare:
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.vars.outputs.tag }}
            prerelease: ${{ steps.vars.outputs.prerelease }}
        steps:
            - id: vars
              shell: bash
              run: |
                  if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
                    echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                    echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
                  else
                    echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
                    echo "prerelease=false" >> "$GITHUB_OUTPUT"
                  fi

    verify:
        name: Verify release build inputs
        needs: prepare
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: agent
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: refs/tags/${{ needs.prepare.outputs.tag }}

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: agent

            - name: Run tests
              run: cargo test --locked --all-features

            - name: Run clippy
              run: cargo clippy --locked --all-targets --all-features -- -D warnings

    build:
        name: Build ${{ matrix.asset_name }}
        needs:
            - prepare
            - verify
        runs-on: ${{ matrix.runner }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: windows-latest
                      asset_name: anqclaw-x86_64-pc-windows-msvc
                      archive_name: anqclaw-x86_64-pc-windows-msvc.zip
                      binary_path: agent/target/release/anqclaw.exe
                      packaged_binary_name: anqclaw.exe
                    - runner: ubuntu-latest
                      asset_name: anqclaw-x86_64-unknown-linux-gnu
                      archive_name: anqclaw-x86_64-unknown-linux-gnu.tar.gz
                      binary_path: agent/target/release/anqclaw
                      packaged_binary_name: anqclaw
                    - runner: macos-13
                      asset_name: anqclaw-x86_64-apple-darwin
                      archive_name: anqclaw-x86_64-apple-darwin.tar.gz
                      binary_path: agent/target/release/anqclaw
                      packaged_binary_name: anqclaw
                    - runner: macos-14
                      asset_name: anqclaw-aarch64-apple-darwin
                      archive_name: anqclaw-aarch64-apple-darwin.tar.gz
                      binary_path: agent/target/release/anqclaw
                      packaged_binary_name: anqclaw
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: refs/tags/${{ needs.prepare.outputs.tag }}

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable

            - name: Cache Rust artifacts
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: agent

            - name: Build release binary
              run: cargo build --locked --release --manifest-path ${{ env.MANIFEST_PATH }}

            - name: Package Windows asset
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  New-Item -ItemType Directory -Force dist | Out-Null
                  Copy-Item "${{ matrix.binary_path }}" "dist/${{ matrix.packaged_binary_name }}"
                  Compress-Archive -Path "dist/${{ matrix.packaged_binary_name }}" -DestinationPath "${{ matrix.archive_name }}" -Force

            - name: Package Unix asset
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  mkdir -p dist
                  cp "${{ matrix.binary_path }}" "dist/${{ matrix.packaged_binary_name }}"
                  tar -C dist -czf "${{ matrix.archive_name }}" "${{ matrix.packaged_binary_name }}"

            - name: Upload packaged artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.asset_name }}
                  path: ${{ matrix.archive_name }}
                  if-no-files-found: error

    release:
        name: Publish GitHub release
        needs:
            - prepare
            - verify
            - build
        runs-on: ubuntu-latest
        steps:
            - name: Download packaged artifacts
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  pattern: anqclaw-*
                  merge-multiple: true

            - name: Create or update GitHub release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.prepare.outputs.tag }}
                  name: ${{ needs.prepare.outputs.tag }}
                  draft: false
                  prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
                  generate_release_notes: true
                  files: release-assets/*
