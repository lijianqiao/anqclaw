# =============================================================================
# anqclaw configuration file
# =============================================================================

[app]
name = "anqclaw"
workspace = "./workspace"
log_level = "info"        # trace | debug | info | warn | error

# =============================================================================
# Feishu (Lark) integration
# =============================================================================
[feishu]
app_id = "cli_xxxxxxxxxxxx"
# Plaintext value (dev/test only):
#   app_secret = "your-actual-secret"
# Or reference an environment variable (recommended for production):
app_secret = "${ANQ_FEISHU_APP_SECRET}"
# List of Feishu open IDs allowed to send commands to the agent.
# Leave empty to allow all users (not recommended for production).
allow_from = []

# =============================================================================
# LLM provider
# =============================================================================
[llm]
provider = "anthropic"             # "anthropic" | "openai_compat"
model = "claude-sonnet-4-20250514"
# Plaintext value (dev/test only):
#   api_key = "sk-ant-xxxxxxxx"
# Or reference an environment variable (recommended for production):
api_key = "${ANQ_LLM_API_KEY}"
base_url = ""                  # Leave empty for Anthropic; required for openai_compat
max_tokens = 4096
temperature = 0.7

# =============================================================================
# Persistent memory (SQLite)
# =============================================================================
[memory]
db_path = "./data/memory.db"
history_limit = 20           # Number of recent messages to include as context
search_limit = 5             # Max results returned by semantic search

# =============================================================================
# Heartbeat — periodic proactive messages
# =============================================================================
[heartbeat]
enabled = false
interval_minutes = 30
notify_channel = "feishu"
notify_chat_id = "oc_xxxxx"

# =============================================================================
# Tool configuration
# =============================================================================
[tools]
# Shell tool
shell_enabled = true
shell_allowed_commands = ["ls", "cat", "grep", "find", "date", "curl"]
shell_timeout_secs = 30

# Web fetch tool
web_fetch_enabled = true
web_fetch_timeout_secs = 10
web_fetch_max_bytes = 102400 # 100 KiB

# File tool
file_enabled = true
file_access_dir = "./workspace" # Restrict file operations to this directory

# Memory search tool
memory_tool_enabled = true
memory_tool_search_limit = 5

# =============================================================================
# Agent loop
# =============================================================================
[agent]
max_tool_rounds = 10
# Path to a custom system prompt file. Leave empty to auto-assemble from
# workspace/*.md files.
system_prompt_file = ""
